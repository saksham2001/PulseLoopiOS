name: SwiftLint

# Style/lint check on Swift sources. Kept separate from the build so a style nit
# doesn't block you from seeing whether the code actually compiles and tests pass.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: swiftlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      # No --strict: warnings (style nits like long lines) annotate the PR but
      # don't fail CI on day one. Only error-level violations block the merge.
      # Tighten by adding --strict once the codebase is clean.
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging
