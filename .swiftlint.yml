# SwiftLint configuration for PulseLoop.
#
# Tuned to be helpful, not hostile, for an open-source project taking outside
# PRs: catch real smells and keep the codebase consistent, but don't reject
# contributions over cosmetic line-length or whitespace nits. Tighten over time.

included:
  - PulseLoop
  - PulseLoopLiveActivity
  - PulseLoopTests

excluded:
  - .build
  - DerivedData
  - "**/*.generated.swift"

# Rules that are off by default but worth opting into.
opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - contains_over_first_not_nil
  - last_where
  - sorted_first_last
  - redundant_nil_coalescing
  - unneeded_parentheses_in_closure_argument
  - toggle_bool
  - yoda_condition

# Rules we deliberately relax for this project.
disabled_rules:
  - todo                 # TODO/FIXME markers are fine in an evolving codebase.
  - trailing_comma       # Multiline trailing commas are a matter of taste here.
  - force_try            # `try!` is fine in tests and in known-safe decode paths.
  - first_where          # Established style uses `.filter { }.first` in places.

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

# Short names are common and intentional in this codebase (BLE byte math,
# SwiftData contexts `c`, loop indices, etc.), so don't warn on length at all.
# Only flag genuinely bad names via the type checks below.
identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 60
    error: 80

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

reporter: "xcode"
